<!doctype html>
<!--
  AI Gauge social preview · 1280×640 · GitHub Open Graph
  Render (Chrome headless clips ~80px off the bottom at exact 1280×640,
  so render at 720 then top-crop to 640):

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars \
      --window-size=1280,720 --force-device-scale-factor=1 \
      --virtual-time-budget=4000 \
      --screenshot=/tmp/social-raw.png \
      "file://$(pwd)/assets/social-preview.html"

    python3 -c "from PIL import Image; \
      Image.open('/tmp/social-raw.png').convert('RGBA').crop((0,0,1280,640)) \
      .save('assets/social-preview.png','PNG',optimize=True)"
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AI Gauge — social preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ──────────────────────────────────────────────────────────────
       ai-gauge social preview · 1280×640
       Design: terminal-instrument. Warm amber accent on deep neutral.
       Font: JetBrains Mono throughout, weight & tracking carry
       hierarchy. Asymmetric layout. Gauge tick marks as decoration.
       ────────────────────────────────────────────────────────────── */

    :root {
      --bg:          #0d0e12;
      --bg-pill:     #16181f;
      --bg-pill-2:   #11131a;
      --line:        #20232c;
      --line-2:      #2c2f39;
      --text:        #e8e3d4;   /* warm cream */
      --text-2:      #c2bdaf;
      --muted:       #6a6c75;
      --dim:         #3d4049;
      --very-dim:    #2a2c33;
      --accent:      #ffa657;   /* warm amber – matches the warning state */
      --accent-soft: #f5a25d;
      --accent-deep: #c97a36;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1280px;
      height: 640px;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-feature-settings: 'tnum' 1, 'ss01' 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 1280px;
      height: 640px;
      /* fine dot grid – evokes a measurement field */
      background-color: var(--bg);
      background-image:
        radial-gradient(circle, rgba(232,227,212,0.022) 1px, transparent 1.2px);
      background-size: 28px 28px;
      background-position: 14px 14px;
      overflow: hidden;
    }

    /* very gentle radial wash, top-left → bottom-right */
    .canvas::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1100px 700px at 8% 0%, rgba(255,166,87,0.045), transparent 55%),
        radial-gradient(900px 600px at 100% 100%, rgba(255,166,87,0.025), transparent 60%);
      pointer-events: none;
    }

    /* hairline frame – gives the canvas a printed feel without shouting */
    .canvas::after {
      content: "";
      position: absolute;
      left: 24px; right: 24px; top: 24px; bottom: 24px;
      border: 1px solid rgba(232,227,212,0.04);
      pointer-events: none;
    }

    /* ── corner registration ticks ────────────────────────────── */
    .reg {
      position: absolute;
      width: 14px; height: 14px;
      color: var(--very-dim);
    }
    .reg::before, .reg::after {
      content: "";
      position: absolute;
      background: currentColor;
    }
    .reg::before { width: 14px; height: 1px; top: 0; left: 0; }
    .reg::after  { width: 1px; height: 14px; top: 0; left: 0; }

    .reg.tl { top: 24px; left: 24px; }
    .reg.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .reg.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .reg.br { bottom: 24px; right: 24px; transform: scale(-1, -1); }

    /* ── title cluster (left) ─────────────────────────────────── */
    .title-block {
      position: absolute;
      top: 116px;
      left: 80px;
      max-width: 820px;
    }

    .title {
      font-weight: 800;
      font-size: 142px;
      line-height: 0.92;
      letter-spacing: -0.055em;
      color: var(--text);
      white-space: nowrap;
    }
    .title .star {
      color: var(--accent);
      font-weight: 700;
      font-size: 0.78em;
      vertical-align: 0.08em;
      margin: 0 0.04em;
      letter-spacing: 0;
    }
    .title .sub-ai { color: var(--text); }

    .tagline {
      margin-top: 22px;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--text-2);
      line-height: 1.35;
    }
    .tagline strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── hero bar pill ────────────────────────────────────────── */
    .pill-cluster {
      position: absolute;
      top: 412px;
      left: 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0;
      padding: 14px 26px 16px;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--bg-pill) 0%, var(--bg-pill-2) 100%);
      border: 1px solid var(--line);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.025),
        inset 0 -1px 0 rgba(0,0,0,0.4),
        0 1px 0 rgba(0,0,0,0.5),
        0 18px 40px -18px rgba(0,0,0,0.6);
      font-size: 38px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
      width: max-content;
    }
    .pill .star {
      color: var(--accent);
      font-weight: 600;
      margin-right: 0.42em;
      text-shadow: 0 0 18px rgba(255,166,87,0.25);
    }
    .pill .pct {
      color: var(--accent);
      font-weight: 700;
    }
    .pill .gap { display: inline-block; width: 0.5em; }
    .pill .countdown {
      color: var(--text-2);
      font-weight: 500;
    }
    .pill .mid {
      color: var(--dim);
      margin: 0 0.5em;
    }
    .pill .week {
      color: var(--text);
      font-weight: 600;
    }
    .pill .week-suffix {
      color: var(--muted);
      font-weight: 500;
    }

    /* fill bar beneath the pill – literal gauge visualization
       width matches the pill above so they read as a single
       fused element (gauge + readout) */
    .fill {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 0;
    }
    .fill-track {
      position: relative;
      height: 7px;
      background: var(--very-dim);
      border-radius: 2px;
      overflow: visible;
    }
    .fill-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 44%;
      background: linear-gradient(90deg, var(--accent-deep) 0%, var(--accent) 100%);
      border-radius: 2px;
      box-shadow: 0 0 16px rgba(255,166,87,0.4);
    }
    .fill-marker {
      position: absolute;
      left: 44%;
      top: -4px;
      width: 3px;
      height: 15px;
      background: var(--text);
      transform: translateX(-1.5px);
      border-radius: 1px;
      box-shadow: 0 0 8px rgba(255,166,87,0.6);
    }
    .fill-label {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.22em;
      color: var(--text-2);
      text-transform: uppercase;
    }
    .fill-label .now {
      color: var(--accent);
      margin-left: 14px;
    }
    .fill-label .sep {
      color: var(--dim);
      margin: 0 14px 0 12px;
    }

    /* ── providers, right-aligned cluster ─────────────────────── */
    .providers {
      position: absolute;
      right: 80px;
      bottom: 122px;
      max-width: 600px;
      text-align: right;
    }
    .providers .label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 14px;
    }
    .providers .tier-1 {
      display: block;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .providers .tier-1 .sep {
      color: var(--accent);
      opacity: 0.7;
      margin: 0 10px;
      font-weight: 500;
    }
    .providers .tier-2 {
      display: block;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--muted);
      opacity: 0.85;
      line-height: 1.4;
    }
    .providers .tier-2 .sep {
      color: var(--dim);
      margin: 0 8px;
    }

    /* ── platform line, bottom right corner ──────────────────── */
    .platform {
      position: absolute;
      right: 80px;
      bottom: 54px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-2);
    }
    .platform .sep {
      color: var(--dim);
      margin: 0 12px;
    }

    /* ── decorative gauge dial ticks (left edge) ─────────────── */
    .dial {
      position: absolute;
      left: 50px;
      top: 156px;
      width: 18px;
      height: 348px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-start;
    }
    .dial .t {
      height: 1px;
      background: var(--dim);
    }
    .dial .t.a { width: 14px; }
    .dial .t.b { width: 8px; opacity: 0.55; }
    .dial .t.c { width: 5px; opacity: 0.4; }
    .dial .t.live {
      width: 18px;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(255,166,87,0.5);
    }
    .dial-label {
      position: absolute;
      left: 38px;
      top: 152px;
      font-size: 9px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--dim);
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      transform-origin: left top;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <!-- corner registration ticks · subtle printed feel -->
    <span class="reg tl"></span>
    <span class="reg tr"></span>
    <span class="reg bl"></span>
    <span class="reg br"></span>

    <!-- gauge dial ticks down the left edge -->
    <div class="dial" aria-hidden="true">
      <span class="t a"></span>
      <span class="t c"></span>
      <span class="t b"></span>
      <span class="t c"></span>
      <span class="t a"></span>
      <span class="t c"></span>
      <span class="t b"></span>
      <span class="t c"></span>
      <span class="t live"></span>
      <span class="t c"></span>
      <span class="t b"></span>
      <span class="t c"></span>
      <span class="t a"></span>
    </div>

    <!-- title cluster, left -->
    <div class="title-block">
      <h1 class="title"><span class="sub-ai">AI</span><span class="star">✦</span>GAUGE</h1>
      <p class="tagline">
        Real-time AI usage monitor for <strong>Claude Code</strong>,
        <strong>Codex</strong> and <strong>OpenCode</strong>.<br />
        Rate limits, countdowns, desktop alerts.
      </p>
    </div>

    <!-- hero bar pill + fused gauge progress strip -->
    <div class="pill-cluster">
      <div class="pill">
        <span class="star">✦</span><span class="pct">44%</span><span class="gap"></span><span class="countdown">2h31m</span><span class="mid">·</span><span class="week">15%</span><span class="week-suffix">w</span>
      </div>
      <div class="fill" aria-hidden="true">
        <div class="fill-track">
          <div class="fill-bar"></div>
          <div class="fill-marker"></div>
        </div>
        <div class="fill-label">5-Hour Window<span class="sep">—</span><span class="now">44%</span></div>
      </div>
    </div>

    <!-- providers, right-aligned cluster -->
    <div class="providers">
      <span class="label">Providers</span>
      <span class="tier-1">Claude<span class="sep">·</span>Codex<span class="sep">·</span>OpenCode</span>
      <span class="tier-2">Z.ai<span class="sep">·</span>OpenRouter<span class="sep">·</span>MiniMax<span class="sep">·</span>Komilion</span>
    </div>

    <!-- platform line, bottom right corner -->
    <div class="platform">
      Linux Waybar<span class="sep">·</span>macOS Menubar
    </div>
  </div>
</body>
</html>
