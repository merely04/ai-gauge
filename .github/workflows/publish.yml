name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate version consistency against tag
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash scripts/validate-release.sh --tag "$GITHUB_REF_NAME"

  build-macos-binary:
    needs: validate-release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build universal binary and .app bundle
        run: bash scripts/build-macos-binary.sh

      - name: Verify universal binary
        run: lipo -info bin/AIGauge.app/Contents/MacOS/AIGauge | grep -qE "arm64.*x86_64|x86_64.*arm64"

      - name: Verify bundle Info.plist
        run: plutil -lint bin/AIGauge.app/Contents/Info.plist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-gauge-menubar
          path: |
            bin/ai-gauge-menubar
            bin/AIGauge.app/**

  publish:
    needs: build-macos-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: ai-gauge-menubar
          path: bin/

      - name: Make binaries executable
        run: |
          chmod +x bin/ai-gauge-menubar
          chmod +x bin/AIGauge.app/Contents/MacOS/AIGauge

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" ver "]")) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          INSTALL_FOOTER=$'\n\n---\n\n## Installation\n\nai-gauge is distributed via npm only — the macOS `.app` bundle is a UI client and requires the daemon (`ai-gauge-server`) shipped inside the npm package.\n\n```bash\nbun add -g ai-gauge\nai-gauge setup\n```\n\nSee the [README](https://github.com/'"$GITHUB_REPOSITORY"'#install) for full instructions.'
          if [ -z "$BODY" ]; then
            echo "::warning::No CHANGELOG entry for v$VERSION — using auto-generated notes"
            if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
              echo "::warning::Release $GITHUB_REF_NAME already exists — deleting and recreating"
              gh release delete "$GITHUB_REF_NAME" --yes --cleanup-tag=false
            fi
            gh release create "$GITHUB_REF_NAME" \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
            gh release edit "$GITHUB_REF_NAME" --notes "$(gh release view "$GITHUB_REF_NAME" --json body -q .body)$INSTALL_FOOTER" || true
            exit 0
          fi
          printf '%s' "$BODY" > /tmp/release-notes.md
          PREV_TAG=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            {
              printf '\n---\n\n'
              printf '**Full Changelog**: https://github.com/%s/compare/%s...%s\n' \
                "$GITHUB_REPOSITORY" "$PREV_TAG" "$GITHUB_REF_NAME"
            } >> /tmp/release-notes.md
          fi
          printf '%s' "$INSTALL_FOOTER" >> /tmp/release-notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "::warning::Release $GITHUB_REF_NAME already exists — deleting and recreating"
            gh release delete "$GITHUB_REF_NAME" --yes --cleanup-tag=false
          fi
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "$GITHUB_REF_NAME"
