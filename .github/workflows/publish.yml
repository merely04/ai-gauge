name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-binary:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build universal binary and .app bundle
        run: bash scripts/build-macos-binary.sh

      - name: Verify universal binary
        run: lipo -info bin/AIGauge.app/Contents/MacOS/AIGauge | grep -qE "arm64.*x86_64|x86_64.*arm64"

      - name: Verify bundle Info.plist
        run: plutil -lint bin/AIGauge.app/Contents/Info.plist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-gauge-menubar
          path: |
            bin/ai-gauge-menubar
            bin/AIGauge.app/**

  publish:
    needs: build-macos-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: ai-gauge-menubar
          path: bin/

      - name: Make binaries executable
        run: |
          chmod +x bin/ai-gauge-menubar
          chmod +x bin/AIGauge.app/Contents/MacOS/AIGauge

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
