name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-binary:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build arm64
        run: swift build --package-path macos/AIGauge -c release --arch arm64

      - name: Build x86_64
        run: swift build --package-path macos/AIGauge -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            -output bin/ai-gauge-menubar \
            macos/AIGauge/.build/arm64-apple-macosx/release/AIGauge \
            macos/AIGauge/.build/x86_64-apple-macosx/release/AIGauge

      - name: Ad-hoc sign
        run: codesign --force --sign - bin/ai-gauge-menubar

      - name: Verify universal binary
        run: lipo -info bin/ai-gauge-menubar | grep -qE "arm64.*x86_64|x86_64.*arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-gauge-menubar
          path: bin/ai-gauge-menubar

  publish:
    needs: build-macos-binary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: ai-gauge-menubar
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/ai-gauge-menubar

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
